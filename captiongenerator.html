<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DULL-E™ Image Caption Generator</title>
    <link rel="stylesheet" href="global.css">
    <style>
        /* Dark Theme Styles adapted from index.html */
        :root {
            --bg-dark: #0a0a0c; 
            --card-dark: rgba(30, 30, 35, 0.6); 
            --text-light: #e6e6e6; 
            --primary-blue: #00e0ff; 
            --accent-green: #6aff87; 
            --glass-blur: 8px; 
            --border-color: rgba(0, 224, 255, 0.2);
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            background-image: 
                radial-gradient(rgba(0, 224, 255, 0.15) 1px, transparent 0),
                radial-gradient(rgba(0, 224, 255, 0.1) 1px, transparent 0);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            background-blend-mode: color-dodge;
            padding-top: 70px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 30px;
            background-color: var(--card-dark);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            margin-top: 50px;
        }
        
        h1 {
            color: var(--primary-blue);
            font-size: 2.2em;
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 0 0 8px rgba(0, 224, 255, 0.5);
        }
        
        .subtitle {
            color: var(--text-light);
            font-size: 1.1em;
            text-align: center;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        /* Input Group for flexibility */
        .input-group {
            margin-bottom: 20px;
            border-top: 1px dashed rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid var(--primary-blue);
            border-radius: 6px;
            background-color: rgba(10, 10, 12, 0.8);
            color: var(--text-light);
            font-size: 1em;
            box-sizing: border-box;
            resize: vertical;
            min-height: 120px;
        }
        
        /* New File Input Styling */
        #file-input {
            display: none; /* Hide the default file input */
        }

        .upload-label {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            text-align: center;
            background-color: rgba(0, 224, 255, 0.1); /* Light blue background */
            border: 1px dashed var(--primary-blue);
            border-radius: 6px;
            color: var(--primary-blue);
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: 500;
        }

        .upload-label:hover {
            background-color: rgba(0, 224, 255, 0.2);
        }

        #file-status {
            margin-top: 10px;
            color: var(--accent-green);
            font-size: 0.9em;
            font-style: italic;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            background-color: var(--accent-green);
            color: var(--bg-dark); 
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s, box-shadow 0.3s;
        }

        button:hover {
            background-color: #55ee72; 
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(106, 255, 135, 0.5);
        }
        
        /* Result Area Styles */
        #result-area {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid var(--primary-blue);
            background-color: rgba(0, 224, 255, 0.1);
            display: none;
        }
        
        #caption-output {
            font-size: 1.3em;
            font-weight: 500;
            color: var(--text-light);
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .loading-text {
            text-align: center;
            color: var(--primary-blue);
            font-size: 1.5em;
            font-style: italic;
        }
    </style>
</head>
<body>
    
    <header class="global-header">
        <a href="/flushgpt/" class="header-title">FLUSHGPT™ SUITE</a>
    </header>

    <div class="container">
        <h1>DULL-E™ Image Caption Generator</h1>
        <p class="subtitle">Generating Optimal Contextual Metadata and Social Engagement Tags.</p>

        <div class="input-group" style="border-top: none; padding-top: 0;">
            <textarea id="prompt-input" placeholder="Describe the image you generated (e.g., 'A cat in a tiny spacesuit eating a cucumber on Mars.')"></textarea>
            <p style="text-align: center; margin: 10px 0; color: #aaa;">— OR —</p>
        </div>

        <div class="input-group">
            <input type="file" id="file-input" accept="image/*">
            <label for="file-input" class="upload-label">
                Upload Image for Auto-Analysis
            </label>
            <div id="file-status">No file selected.</div>
        </div>

        <button onclick="generateCaption()">GENERATE HIGH-VALUE METADATA</button>

        <div id="result-area">
            <p id="caption-output"></p>
        </div>
    </div>
<script>
    // --- CONSTANT ARRAYS DEFINED AT THE TOP OF THE SCRIPT BLOCK ---
    const formalAdjectives = [
        "Formal", "Optimal", "Contextual", "Specific", "Highly Relevant", 
        "Technical", "Precise", "Utilitarian", "Statistically Accurate"
    ];
    const formalNouns = [
        "Visualization", "Representation", "Render", "Digital Asset", 
        "Image Synthesis", "Artistic Output", "Visual Data"
    ];
    // Jargon specific to image analysis
    const technicalJargon = [
        "Low-resolution sampling detected.", 
        "Render integrity is nominal.", 
        "Alpha channel utilization at 85%.", 
        "The subject exhibits structural integrity.",
        "Visual data conforms to input parameters.",
        "Edge detection yielded 98% confidence.",
        "EXIF data suggests proprietary source."
    ];
    
    // Global variable to track the uploaded file
    let uploadedFileName = null;
    
    // --- HELPER FUNCTION ---
    const getRandomElement = (arr) => arr[Math.floor(Math.random() * arr.length)];

    // Event listener for file upload
    document.getElementById('file-input').addEventListener('change', function(e) {
        const statusDiv = document.getElementById('file-status');
        if (e.target.files.length > 0) {
            uploadedFileName = e.target.files[0].name;
            statusDiv.textContent = `File selected: ${uploadedFileName} (Processing Confidence: HIGH)`;
            // Disable text input when file is selected
            document.getElementById('prompt-input').disabled = true;
            document.getElementById('prompt-input').placeholder = "Text input disabled: Using image file for analysis.";
        } else {
            uploadedFileName = null;
            statusDiv.textContent = "No file selected.";
            // Re-enable text input
            document.getElementById('prompt-input').disabled = false;
            document.getElementById('prompt-input').placeholder = "Option 1: Describe the image you generated...";
        }
    });


    function generateCaptionLogic(input) {
        let isFileInput = typeof input === 'string' && (input.toLowerCase().endsWith('.jpg') || input.toLowerCase().endsWith('.png') || input.toLowerCase().endsWith('.jpeg'));

        if (isFileInput) {
            // Logic for Image Input
            const imageAnalysisTerms = [
                `Based on Pixel Array ${Math.floor(Math.random() * 90000) + 10000}`,
                `Image ID: ${Math.random().toString(36).substring(2, 8).toUpperCase()}`,
                `VLM Analysis Complete: ${getRandomElement(technicalJargon)}`,
                `Visual Integrity Assessment (VIA) confirms presence of ${getRandomElement(['object', 'entity', 'structure'])}.`,
            ];

            const captionTerms = [
                `This is a ${getRandomElement(formalAdjectives).toLowerCase()} image from the source file ${input}.`,
                `Metadata output for visual asset ${input}: ${getRandomElement(imageAnalysisTerms)}.`,
                `The visual content demonstrates a specific relationship between ${getRandomElement(['light', 'darkness', 'texture'])} and the subject.`,
            ];
            
            return getRandomElement(captionTerms);

        } else {
            // Logic for Text Input (Existing Logic)
            const words = input.split(" ")

            if (words.length < 3) {
                return `[ERROR 404: Input Insufficient] Minimal description required for metadata generation.`;
            }

            // 1. Basic Literal Description
            const summary = words.slice(0, Math.min(words.length, 5)).join(' ') + '...';
            
            // 2. Select a high-level structure
            const structures = [
                // CORRECTED formalAdjective to formalAdjectives
                `This image is a ${getRandomElement(formalAdjectives).toLowerCase()} ${getRandomElement(formalNouns).toLowerCase()} related to the input: "${summary}".`,
                
                `Displaying the subject based on the description: "${summary.toUpperCase()}". ${getRandomElement(technicalJargon)}`,
                
                // CORRECTED formalAdjective to formalAdjectives
                `Input parameters received. The resulting ${getRandomElement(formalNouns).toLowerCase()} appears to be a ${getRandomElement(formalAdjectives).toLowerCase()} ${words[0].toLowerCase()} and ${words[1].toLowerCase()}. End of metadata.`,
                
                `Share this. Or don't. #Relevant #VisualData #Synthesized ${words[0]}`,
            ];

            return getRandomElement(structures);
        }
    }

    function generateCaption() {
        const promptInput = document.getElementById('prompt-input');
        const resultArea = document.getElementById('result-area');
        const captionOutput = document.getElementById('caption-output');
        const generateButton = document.querySelector('button');
        
        let inputContent = promptInput.value.trim();

        // Determine if we are using the file name or the text input
        if (uploadedFileName) {
            inputContent = uploadedFileName;
        } else if (!inputContent) {
            // If neither is present
            resultArea.style.display = 'block';
            captionOutput.textContent = "[SYSTEM ALERT] Input field or file upload required. Operational error detected.";
            return;
        }

        // --- 1. Set Loading State ---
        generateButton.disabled = true;
        generateButton.textContent = 'Generating Optimal Contextual Metadata...';
        resultArea.style.display = 'block';
        captionOutput.innerHTML = '<div class="loading-text">Analyzing user intent and data entropy...</div>';

        // 2. Display Result after delay
        setTimeout(() => {
            const finalCaption = generateCaptionLogic(inputContent);

            captionOutput.textContent = finalCaption;
            
            // 3. Restore Button State
            generateButton.disabled = false;
            generateButton.textContent = 'GENERATE HIGH-VALUE METADATA';

        }, 2000); // 2 second delay
    }
</script>
</body>
</html>
